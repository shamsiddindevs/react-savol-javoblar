  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      padding: 0
    }

    html,
    body {
      height: 100%;
      font-family: 'Poppins', -apple-system, system-ui, sans-serif;
      overflow-x: hidden

    ::-webkit-scrollbar {
      display: none

    input,
    textarea,
    select,
    button {

    @keyframes spin {
      from {
        transform: rotate(0deg)
      }

      to {
        transform: rotate(360deg)
      }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(12px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* ── CSS vars from Telegram theme ── */
    :root {
      --bg: var(--tg-theme-bg-color, #f0f2f5);
      --card: var(--tg-theme-secondary-bg-color, #ffffff);
      --text: var(--tg-theme-text-color, #111827);
      --sub: var(--tg-theme-hint-color, #6b7280);
      --btn: var(--tg-theme-button-color, #6366f1);
      --btnt: var(--tg-theme-button-text-color, #ffffff);
      --lnk: var(--tg-theme-link-color, #6366f1);
      --brd: rgba(0, 0, 0, .1);
      --inp: rgba(0, 0, 0, .05);
      --inp-brd: rgba(0, 0, 0, .15);
      --success: #22c55e;
      --danger: #ef4444;
      --warn: #f59e0b;
    }

    body {
      background: var(--bg);
      color: var(--text)
    }

    /* ── Layout ── */
    #root {
      min-height: 100vh;
      display: flex;
      flex-direction: column
    }

    #page {
      flex: 1;
      padding-bottom: 72px;
      animation: fadeUp .25s ease
    }

    /* ── Tab bar ── */
    #tabbar {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 200;
      background: var(--card);
      border-top: 1px solid var(--brd);
      display: flex;
      padding-bottom: env(safe-area-inset-bottom, 0px)
    }

    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 0 6px;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--sub);
      transition: color .15s;
      position: relative
    }

    .tab.on {
      color: var(--btn)
    }

    .tab-bar {
      position: absolute;
      top: 0;
      left: 20%;
      right: 20%;
      height: 2.5px;
      border-radius: 2px;
      background: var(--btn);
      opacity: 0;
      transition: opacity .15s
    }

    .tab.on .tab-bar {
      opacity: 1
    }

    .tab svg {
      transition: transform .15s
    }

    .tab.on svg {
      transform: scale(1.12)
    }

    .tab span {
      font-size: 10px;
      font-weight: 500;
      margin-top: 3px
    }

    .tab.on span {
      font-weight: 700
    }

    /* ── Cards / common ── */
    .card {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--brd)
    }

    .btn-primary {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      cursor: pointer;
      background: linear-gradient(135deg, var(--btn), #7c3aed);
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      box-shadow: 0 4px 18px color-mix(in srgb, var(--btn) 40%, transparent);
      transition: opacity .15s, transform .1s
    }

    .btn-primary:active {
      opacity: .82;
      transform: scale(.98)
    }

    .btn-primary:disabled {
      background: #d1d5db;
      color: #9ca3af;
      box-shadow: none;
      cursor: default
    }

    .btn-outline {
      width: 100%;
      padding: 13px;
      border-radius: 14px;
      border: 1.5px solid var(--brd);
      background: none;
      color: var(--sub);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity .15s
    }

    .btn-outline:active {
      opacity: .7
    }

    /* ── Inputs ── */
    .field {
      width: 100%;
      box-sizing: border-box;
      padding: 12px 13px;
      border-radius: 12px;
      border: 1.5px solid var(--inp-brd);
      background: var(--inp);
      color: var(--text);
      font-size: 13px;
      outline: none;
      transition: border-color .15s
    }

    .field:focus {
      border-color: var(--btn)
    }

    .field-ico {
      padding-left: 42px
    }

    .inp-wrap {
      position: relative
    }

    .inp-ico {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none
    }

    textarea.field {
      resize: none;
      padding: 12px 13px
    }

    select.field {
      appearance: none
    }

    /* ── Section header ── */
    .sec-hdr {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px 10px
    }

    .sec-hdr h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 800
    }

    .sec-hdr p {
      margin: 2px 0 0;
      font-size: 12px;
      color: var(--sub)
    }

    /* ── Search ── */
    .search-wrap {
      position: relative;
      margin: 6px 16px 10px
    }

    .search-wrap input {
      width: 100%;
      box-sizing: border-box;
      padding: 10px 34px 10px 34px;
      border-radius: 12px;
      border: 1px solid var(--brd);
      background: var(--inp);
      color: var(--text);
      font-size: 13px;
      outline: none
    }

    .search-ico {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      opacity: .5
    }

    .search-clr {
      position: absolute;
      right: 9px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 3px;
      display: none;
      color: var(--sub)
    }

    /* ── Chips ── */
    .chips {
      display: flex;
      gap: 7px;
      padding: 0 16px 10px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch
    }

    .chip {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 13px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid var(--brd);
      background: var(--card);
      color: var(--sub);
      transition: all .15s
    }

    .chip.on {
      border: none;
      background: var(--btn);
      color: var(--btnt);
      box-shadow: 0 2px 10px color-mix(in srgb, var(--btn) 40%, transparent)
    }

    /* ── Q card ── */
    .qcard {
      margin: 0 16px 9px;
      border-radius: 16px;
      overflow: hidden;
      background: var(--card);
      transition: all .25s
    }

    .qcard.open {
      box-shadow: 0 4px 20px rgba(0, 0, 0, .07)
    }

    .qcard-btn {
      width: 100%;
      text-align: left;
      padding: 13px 13px 13px 14px;
      border: none;
      background: none;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 11px
    }

    .qcard-pip {
      width: 3.5px;
      min-height: 42px;
      border-radius: 4px;
      flex-shrink: 0;
      margin-top: 1px
    }

    .qcard-meta {
      flex: 1;
      min-width: 0
    }

    .qcard-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 700;
      padding: 2px 8px 2px 6px;
      border-radius: 7px;
      margin-bottom: 5px
    }

    .qcard-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.45;
      text-align: left
    }

    .qcard-chev {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .25s;
      background: var(--inp)
    }

    .qcard-body {
      overflow: hidden;
      transition: height .32s cubic-bezier(.4, 0, .2, 1);
      height: 0
    }

    .qcard-inner {
      padding: 0 14px 14px 30px;
      border-top: 1px solid var(--brd)
    }

    .qcard-inner p {
      margin: 11px 0 0;
      font-size: 13px;
      color: var(--sub);
      line-height: 1.7
    }

    /* ── Stat tiles ── */
    .grid3 {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 12px 16px 4px
    }

    .grid2 {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      padding: 0 16px 4px
    }

    .stat-tile {
      padding: 11px 6px;
      border-radius: 14px;
      border: 1.5px solid var(--brd);
      background: var(--card);
      cursor: pointer;
      text-align: center;
      transition: all .2s
    }

    .stat-tile.on {
      box-shadow: 0 2px 12px rgba(0, 0, 0, .1)
    }

    .stat-tile .sn {
      font-size: 17px;
      font-weight: 800
    }

    .stat-tile .sl {
      font-size: 10px;
      color: var(--sub);
      font-weight: 600;
      line-height: 1.2;
      white-space: pre-line
    }

    /* ── Quiz options ── */
    .opt {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-radius: 13px;
      border: 1.5px solid var(--brd);
      background: var(--card);
      cursor: pointer;
      text-align: left;
      transition: all .15s
    }

    .opt:disabled {
      cursor: default
    }

    .opt-ltr {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      border: 1.5px solid var(--brd)
    }

    /* ── Alert boxes ── */
    .alert {
      display: flex;
      gap: 7px;
      align-items: flex-start;
      padding: 9px 11px;
      border-radius: 10px
    }

    .alert span {
      font-size: 12px;
      font-weight: 600
    }

    .alert.err {
      background: rgba(239, 68, 68, .08);
      border: 1px solid rgba(239, 68, 68, .25)
    }

    .alert.err span {
      color: #dc2626
    }

    .alert.ok {
      background: rgba(34, 197, 94, .08);
      border: 1px solid rgba(34, 197, 94, .25)
    }

    .alert.ok span {
      color: #16a34a
    }

    .alert.warn {
      background: rgba(245, 158, 11, .08);
      border: 1px solid rgba(245, 158, 11, .3)
    }

    .alert.warn span {
      color: #b45309
    }

    /* ── Mode tabs ── */
    .mode-tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      background: var(--inp);
      border-radius: 14px;
      padding: 4px;
      margin: 14px 16px
    }

    .mode-tab {
      padding: 10px;
      border-radius: 11px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      background: transparent;
      color: var(--sub);
      transition: all .18s
    }

    .mode-tab.on {
      background: var(--btn);
      color: var(--btnt);
      box-shadow: 0 2px 8px color-mix(in srgb, var(--btn) 40%, transparent)
    }

    /* ── Role btns ── */
    .role-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px
    }

    .role-btn {
      padding: 11px 8px;
      border-radius: 12px;
      border: 2px solid var(--inp-brd);
      background: var(--inp);
      color: var(--sub);
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      transition: all .18s
    }

    .role-btn.on {
      background: var(--btn);
      border-color: var(--btn);
      color: var(--btnt)
    }

    /* ── Delete modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, .55);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 300;
      padding: 16px
    }

    .modal-box {
      background: var(--card);
      border-radius: 20px;
      padding: 24px 20px;

      width: 100%;

    }

    /* ── Progress bar ── */
    .prog-track {
      height: 5px;

    }

    .prog-fill {

    /* ── Score circle ── */
    .score-ring {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px
    }
  </style>
</head>

    const H = {
      light: () => TG?.HapticFeedback?.impactOccurred("light"),

    const QUESTIONS = [
      { id: 1, question: "React nima?", answer: "React — Facebook tomonidan yaratilgan ochiq manbali JavaScript kutubxonasi. U komponent asosida UI qurish uchun ishlatiladi va Virtual DOM orqali yangilanishlarni tezlashtiradi.", options: ["UI qurish uchun JavaScript kutubxonasi", "Ma'lumotlar bazasi tizimi", "Dasturlash tili", "Operatsion tizim"], correctAnswer: "UI qurish uchun JavaScript kutubxonasi", category: "React Basics" },
      { id: 2, question: "JSX nima?", answer: "JSX — JavaScript XML. Bu JavaScript ichida HTML-ga o'xshash kod yozishga imkon beruvchi sintaktik kengaytma. Babel uni React.createElement() chaqiruvlariga aylantiradi.", options: ["JavaScript XML sintaksis kengaytmasi", "CSS freymwork", "Ma'lumotlar bazasi so'rovi", "Test kutubxonasi"], correctAnswer: "JavaScript XML sintaksis kengaytmasi", category: "JSX" },

      { id: 4, question: "useState Hook nima?", answer: "useState — funksional komponentlarga lokal holat qo'shish imkonini beruvchi React Hook. U [joriy qiymat, yangilash funksiyasi] massivini qaytaradi. Holat o'zgarganda komponent qayta render qilinadi.", options: ["Funksional komponentga holat qo'shuvchi hook", "Yon ta'sirlar uchun hook", "Context hook", "Memoizatsiya hook"], correctAnswer: "Funksional komponentga holat qo'shuvchi hook", category: "React Basics" },

      let html = `

        <div class="sl">${c.replace(" ", "\n")}</div>
      </button>`).join("")}
    </div>
    <!-- Stat tiles row 2 -->
    <div class="grid2">
      ${statRows.slice(3).map(({ c, m, cnt, on }) => `
      <button class="stat-tile${on ? " on" : ""}" data-cat="${c}"
        style="border-color:${on ? m.color : "var(--brd)"};background:${on ? catBg(c) : "var(--card)"}">
        <div style="font-size:18px;margin-bottom:3px">${m.emoji}</div>
        <div class="sn" style="color:${on ? m.color : "var(--text)"}">${cnt}</div>
        <div class="sl">${c}</div>
      </button>`).join("")}
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <span class="search-ico">${I.search}</span>

    </div>

    <!-- Chips -->
    <div class="chips">
      ${CATS.map(cat => {
        const on = S.learnCat === cat; const m = CAT[cat];
        return `<button class="chip${on ? " on" : ""}" data-chip="${cat}">${m ? `<span>${m.emoji}</span>` : ""}${cat}</button>`;

    function renderQuiz() {
      const q = S.quiz;
      if (q.phase === "start") { renderQuizStart(); return; }
      if (q.phase === "result") { renderQuizResult(); return; }
      renderQuizQuestion();
    }

    function renderQuizStart() {
      const ac = btnColor();
      document.getElementById("page").innerHTML = `
    <div style="padding:0 16px 16px">
      <div style="text-align:center;padding:28px 0 20px">
        <div style="width:80px;height:80px;border-radius:24px;background:linear-gradient(135deg,${ac},#7c3aed);
          margin:0 auto 16px;display:flex;align-items:center;justify-content:center;
          box-shadow:0 8px 28px ${ac}45">${reactLogo(38)}</div>
        <h1 style="font-size:22px;font-weight:800;margin-bottom:6px">Quiz Mode</h1>
        <p style="color:var(--sub);font-size:14px">Bilimingizni sinab ko'ring</p>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px">
        ${[["⚡", "10 Savol", "Tasodifiy"], ["🎯", "O'z Tempingiz", "Vaqt yo'q"], ["🏆", "Natija", "Tahlil bilan"]].map(([e, t, s]) => `

          <div style="font-size:13px;font-weight:700">${t}</div>

    </div>`;

      document.getElementById("startBtn").onclick = () => {
        H.medium();
        const qs = [...S.questions].sort(() => Math.random() - .5).slice(0, Math.min(10, S.questions.length));
        S.quiz = { phase: "active", qs, idx: 0, sel: null, confirmed: false, answers: [] };
        renderQuiz();
      };
    }

    function renderQuizQuestion() {
      const q = S.quiz;
      const cur = q.qs[q.idx];
      const m = CAT[cur.category] || CAT["React Basics"];
      const pct = (q.idx / q.qs.length) * 100;
      const correct = q.answers.filter(a => a.isCorrect).length;
      const ac = btnColor();

      let optsHtml = cur.options.map((opt, i) => {
        let cls = "opt", brd = "var(--brd)", bg = "var(--card)", clr = "var(--text)", icon = "";
        if (!q.confirmed) {
          if (q.sel === opt) { bg = ac + "20"; brd = ac; clr = ac; }
        } else {
          if (opt === cur.correctAnswer) { bg = "rgba(34,197,94,.1)"; brd = "var(--success)"; clr = "var(--success)"; icon = `<span style="margin-left:auto">${I.check.replace('stroke="currentColor"', 'stroke="var(--success)"')}</span>`; }
          else if (opt === q.sel) { bg = "rgba(239,68,68,.1)"; brd = "var(--danger)"; clr = "var(--danger)"; icon = `<span style="margin-left:auto">${I.xcirc.replace('stroke="currentColor"', 'stroke="var(--danger)"')}</span>`; }
          else { clr = "var(--sub)"; }
        }
        return `<button class="${cls}" data-opt="${esc(opt)}" ${q.confirmed ? "disabled" : ""}
      style="border-color:${brd};background:${bg};width:100%">
      <span class="opt-ltr" style="border-color:${brd};color:${clr}">${["A", "B", "C", "D"][i]}</span>
      <span style="flex:1;font-size:13px;font-weight:600;color:${clr}">${esc(opt)}</span>
      ${icon}
    </button>`;
      }).join("");

      let explainHtml = "";
      if (q.confirmed) {
        const ok = q.sel === cur.correctAnswer;
        explainHtml = `<div style="margin:10px 16px 0;padding:12px 14px;border-radius:12px;
      background:${ok ? (isDark() ? "rgba(34,197,94,.1)" : "#f0fdf4") : (isDark() ? "rgba(239,68,68,.1)" : "#fef2f2")};
      border:1px solid ${ok ? "rgba(34,197,94,.3)" : "rgba(239,68,68,.3)"}">
      <p style="margin:0;font-size:12px;color:var(--sub);line-height:1.65">
        <strong style="color:${ok ? "var(--success)" : "var(--danger)"}">${ok ? "✓ To'g'ri!" : "✗ Noto'g'ri."}</strong> ${esc(cur.answer)}
      </p></div>`;
      }

      const actionHtml = !q.confirmed
        ? `<button class="btn-primary" id="confirmBtn" ${!q.sel ? "disabled" : ""}
        style="background:${q.sel ? `linear-gradient(135deg,${ac},#7c3aed)` : "var(--inp)"};color:${q.sel ? "#fff" : "var(--sub)"}">
        Tasdiqlash</button>`
        : `<button class="btn-primary" id="nextBtn"
        style="background:linear-gradient(135deg,${m.color},${ac})">
        ${q.idx + 1 >= q.qs.length ? "Natijani ko'rish 🏆" : "Keyingi Savol →"}
      </button>`;

      document.getElementById("page").innerHTML = `
    <!-- Progress -->
    <div style="padding:12px 16px 8px">
      <div style="display:flex;justify-content:space-between;margin-bottom:7px">
        <span style="font-size:12px;font-weight:700;color:var(--sub)">Savol ${q.idx + 1}/${q.qs.length}</span>
        <span style="font-size:12px;font-weight:700;color:${ac}">${correct} ✓</span>
      </div>
      <div class="prog-track">
        <div class="prog-fill" style="width:${pct}%;background:linear-gradient(90deg,${ac},${m.color})"></div>
      </div>
    </div>

    <!-- Question -->
    <div class="card" style="margin:4px 16px 10px;padding:16px">
      <span class="qcard-badge" style="color:${m.color};background:${catBg(cur.category)};margin-bottom:10px">
        ${m.emoji} ${cur.category}
      </span>
      <p style="font-size:15px;font-weight:700;line-height:1.5">${esc(cur.question)}</p>
    </div>

    <!-- Options -->
    <div id="opts" style="padding:0 16px;display:grid;gap:8px">${optsHtml}</div>

    <!-- Explanation -->
    ${explainHtml}

    <!-- Action -->
    <div style="padding:12px 16px 0">${actionHtml}</div>`;

      // Option click
      document.querySelectorAll("#opts .opt").forEach(btn => {
        btn.onclick = () => {
          if (q.confirmed) return;
          H.select(); S.quiz.sel = btn.dataset.opt; renderQuizQuestion();
        };
      });

      // Confirm
      const confirmBtn = document.getElementById("confirmBtn");
      if (confirmBtn) confirmBtn.onclick = () => {
        if (!q.sel) return;
        H[q.sel === cur.correctAnswer ? "success" : "error"]();
        S.quiz.confirmed = true;
        S.quiz.answers.push({ question: cur.question, selected: q.sel, correct: cur.correctAnswer, isCorrect: q.sel === cur.correctAnswer });
        renderQuizQuestion();
      };

      // Next
      const nextBtn = document.getElementById("nextBtn");
      if (nextBtn) nextBtn.onclick = () => {
        H.light();
        if (q.idx + 1 >= q.qs.length) { S.quiz.phase = "result"; renderQuizResult(); }
        else { S.quiz.idx++; S.quiz.sel = null; S.quiz.confirmed = false; renderQuizQuestion(); }
      };
    }

    function renderQuizResult() {
      const { answers, qs } = S.quiz;
      const score = answers.filter(a => a.isCorrect).length;
      const total = qs.length;
      const pct = Math.round(score / total * 100);
      const ac = btnColor();
      const [gc, gl] = pct >= 90 ? ["var(--success)", "Ajoyib! 🎉"] : pct >= 70 ? [ac, "Zo'r! 👍"] : pct >= 50 ? ["var(--warn)", "Yaxshi! 💪"] : ["var(--danger)", "Mashq Kerak! 📚"];

      <div style="display:flex;gap:8px;align-items:flex-start">
        <div style="flex-shrink:0;margin-top:2px">${a.isCorrect ? I.check.replace('stroke="currentColor"', 'stroke="var(--success)"') : I.xcirc.replace('stroke="currentColor"', 'stroke="var(--danger)"')}</div>

          <p style="margin:0 0 3px;font-size:12px;font-weight:600">${esc(a.question)}</p>

        </div>
      </div>
    </div>`).join("");

      document.getElementById("page").innerHTML = `
    <div style="padding:0 16px 16px">
      <div style="text-align:center;padding:24px 0 20px">
        <div class="score-ring" style="background:conic-gradient(${gc} ${pct * 3.6}deg,var(--inp) 0deg);
          box-shadow:0 0 0 7px var(--card),0 6px 24px ${gc}30">
          <div style="width:68px;height:68px;border-radius:50%;background:var(--card);
            display:flex;flex-direction:column;align-items:center;justify-content:center">
            <span style="font-size:22px;font-weight:800">${score}/${total}</span>

        <p style="font-size:18px;font-weight:700;color:${gc};margin-top:4px">${gl}</p>

      <p style="font-size:13px;font-weight:700;color:var(--sub);margin-bottom:8px">Javoblar sharhi</p>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px">

        <button class="btn-outline" id="learnBtn" style="border-color:var(--brd);display:flex;align-items:center;justify-content:center;gap:7px">
          ${I.learn} O'rganish
        </button>
      </div>
    </div>`;

        ${S.authBusy ? "⏳ Yuklanmoqda…" : S.authMode === "login" ? "Kirish" : "Ro'yxatdan O'tish"}
      </button>
      <button class="btn-outline" id="backBtn">← Orqaga</button>
    </div>`;

      document.getElementById("mLogin").onclick = () => { H.select(); S.authMode = "login"; S.authErr = ""; S.authOk = ""; renderAuth(); };
      document.getElementById("mReg").onclick = () => { H.select(); S.authMode = "register"; S.authErr = ""; S.authOk = ""; renderAuth(); };
      document.getElementById("rStudent").onclick = () => { H.select(); S.authRole = "student"; renderAuth(); };
      document.getElementById("rAdmin").onclick = () => { H.select(); S.authRole = "admin"; renderAuth(); };
      document.getElementById("backBtn").onclick = () => { H.light(); S.showAuth = false; S.authErr = ""; S.authOk = ""; renderProfile(); };

      const nameEl = document.getElementById("aName");
      const phoneEl = document.getElementById("aPhone");
      if (nameEl) nameEl.oninput = () => S.authName = nameEl.value;
      if (phoneEl) phoneEl.oninput = () => S.authPhone = phoneEl.value;

      document.getElementById("submitBtn").onclick = () => {
        if (S.authBusy) return;
        S.authErr = ""; S.authOk = "";
        const ph = S.authPhone.trim();
        if (S.authMode === "register" && !S.authName.trim()) { S.authErr = "Ism-familiyangizni kiriting."; H.error(); renderAuth(); return; }
        if (!ph) { S.authErr = "Telefon raqamingizni kiriting."; H.error(); renderAuth(); return; }
        if (!/^\+?[\d\s\-]{7,15}$/.test(ph)) { S.authErr = "To'g'ri telefon raqam kiriting."; H.error(); renderAuth(); return; }
        if (S.authRole === "admin" && ph !== ADMIN_PHONE) { S.authErr = "Ruxsat yo'q. Faqat admin kirishi mumkin."; H.error(); renderAuth(); return; }

        S.authBusy = true; renderAuth();
        setTimeout(() => {
          if (S.authMode === "register") {
            const users = ls.get("rl_users", []);
            if (users.find(u => u.phone === ph && u.role === S.authRole)) { S.authErr = "Bu raqam allaqachon ro'yxatda."; S.authBusy = false; H.error(); renderAuth(); return; }
            const u = { name: S.authName.trim(), phone: ph, role: S.authRole };
            ls.set("rl_users", [...users, u]); ls.set("rl_user", u);
            H.success(); S.authOk = "Hisob yaratildi! 🎉"; S.authBusy = false; renderAuth();
            setTimeout(() => { S.user = u; S.showAuth = false; S.authName = ""; S.authPhone = ""; S.authOk = ""; S.tab = u.role === "admin" ? "admin" : "learn"; render(); }, 800);
          } else {
            if (S.authRole === "admin" && ph === ADMIN_PHONE) {
              const u = { name: "Admin", phone: ph, role: "admin" };
              ls.set("rl_user", u); H.success(); S.authOk = "Xush kelibsiz, Admin!"; S.authBusy = false; renderAuth();
              setTimeout(() => { S.user = u; S.showAuth = false; S.authPhone = ""; S.authOk = ""; S.tab = "admin"; render(); }, 800);
              return;
            }
            const found = ls.get("rl_users", []).find(u => u.phone === ph && u.role === S.authRole);
            if (!found) { S.authErr = "Hisob topilmadi. Avval ro'yxatdan o'ting."; S.authBusy = false; H.error(); renderAuth(); return; }
            ls.set("rl_user", found); H.success(); S.authOk = `Xush kelibsiz, ${found.name}!`; S.authBusy = false; renderAuth();
            setTimeout(() => { S.user = found; S.showAuth = false; S.authPhone = ""; S.authOk = ""; S.tab = "learn"; render(); }, 800);
          }
        }, 550);
      };
    }

    /* ══════════════════════════════════════════════════
       MAIN RENDER
    ══════════════════════════════════════════════════ */
    function render() {
      document.getElementById("page").style.animation = "none";
      requestAnimationFrame(() => {
        document.getElementById("page").style.animation = "";
        const { tab } = S;
        if (tab === "learn") renderLearn();
        else if (tab === "quiz") renderQuiz();
        else if (tab === "admin") renderAdmin();
        else if (tab === "profile") renderProfile();
        renderTabBar();
        document.getElementById("page").scrollTop = 0;
      });
    }

    /* ── Init ── */
    if (TG) {
      const dark = TG.colorScheme === "dark";
      TG.setHeaderColor(dark ? "#17212b" : "#f0f2f5");
      TG.setBackgroundColor(dark ? "#17212b" : "#f0f2f5");
    }
    render();
  </script>
</body>

</html>
